<!DOCTYPE html>
<html>
<head>
  <title>Intermolecular Forces</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }
    h1 {
      background: #4CAF50;
      color: white;
      padding: 15px;
    }
    select {
      padding: 10px;
      margin: 20px;
    }
    .container {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
  </style>
</head>

<body>

<h1>Intermolecular Forces Explorer</h1>

<div class="container">
  <h2>Basic Info</h2>
  <p><b>London Dispersion:</b> Weak forces due to temporary dipoles.</p>
  <p><b>Dipole-Dipole:</b> Attraction between polar molecules.</p>
  <p><b>Hydrogen Bonding:</b> Strong interaction with H and N/O/F.</p>
  <p><b>Ion-Dipole:</b> Attraction between ion and polar molecule.</p>
</div>

<div class="container">
  <h2>Select Molecule</h2>
  <select onchange="showInfo(this.value)">
    <option value="">--Select--</option>
    <option value="H2O">H₂O</option>
    <option value="NH3">NH₃</option>
    <option value="CO2">CO₂</option>
    <option value="CH4">CH₄</option>
    <option value="HCl">HCl</option>
  </select>

  <div id="output"></div>
</div>

<script>
function showInfo(molecule) {
  let data = {
    "H2O": {
      force: "Hydrogen Bonding",
      strength: "Strong",
      explanation: "Water has H bonded to O, allowing hydrogen bonding."
    },
    "NH3": {
      force: "Hydrogen Bonding",
      strength: "Moderate",
      explanation: "Nitrogen allows hydrogen bonding but weaker than water."
    },
    "CO2": {
      force: "London Dispersion",
      strength: "Weak",
      explanation: "Non-polar molecule, only dispersion forces."
    },
    "CH4": {
      force: "London Dispersion",
      strength: "Very Weak",
      explanation: "Symmetrical non-polar molecule."
    },
    "HCl": {
      force: "Dipole-Dipole",
      strength: "Moderate",
      explanation: "Polar bond between H and Cl."
    }
  };

  if (molecule === "") {
    document.getElementById("output").innerHTML = "";
    return;
  }

  let info = data[molecule];

  document.getElementById("output").innerHTML =
    `<h3>${molecule}</h3>
     <p><b>Force:</b> ${info.force}</p>
     <p><b>Strength:</b> ${info.strength}</p>
     <p><b>Explanation:</b> ${info.explanation}</p>`;
}
</script>

</body>
</html>
